apiVersion: kustomize.config.k8s.io/v1beta1
configMapGenerator:
  - files:
      - index.html=./html/index.html
    name: nginx
generatorOptions:
  disableNameSuffixHash: true
kind: Kustomization
metadata:
  annotations:
    argocd.argoproj.io/tracking-id: nginx:kustomize.config.k8s.io/Kustomization:nginx/
  namespace: nginx
patches:
  - path: nginx-deploy.yaml
    target:
      kind: Deployment
      name: nginx
resources: null