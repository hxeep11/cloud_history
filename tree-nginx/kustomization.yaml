apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ArgoCD에서 Helm을 같이 쓰는 경우, 보통 여기에는 Helm 렌더 결과가 들어옵니다.
# 이미 무언가 적혀 있으면 그건 유지하세요.
resources:
  # 필요하면 기존 리소스 선언 유지
  # - some-base.yaml

configMapGenerator:
  - name: portal-nginx-index
    files:
      - index.html=./html/index.html   # html 폴더의 index.html 사용

generatorOptions:
  disableNameSuffixHash: true          # ConfigMap 이름에 해시 안 붙게

patches:
  - path: portal-nginx-deploy-patch.yaml
    target:
      kind: Deployment
      name: portal-nginx               # 실제 Deployment 이름
