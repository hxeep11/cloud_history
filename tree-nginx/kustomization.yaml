apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# 1) 여기에는 실제 portal-nginx Deployment가 포함된 리소스를 넣어야 함
#    - 만약 Helm 템플릿 결과를 파일로 저장해두었다면 그 파일 이름
#    - 지금 당장은 테스트용으로 live 백업을 그대로 써도 됨 (metadata는 나중에 정리)
resources:
  - portal-nginx.deploy.live.yaml.bak   # 일단 이걸로 테스트

# 2) index.html을 ConfigMap으로 생성
configMapGenerator:
  - name: portal-nginx-index
    files:
      - index.html=./html/index.html

generatorOptions:
  disableNameSuffixHash: true

# 3) Strategic Merge Patch 방식으로 Deployment에 볼륨/마운트 추가
patchesStrategicMerge:
  - portal-nginx-deploy-patch.yaml
