apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: portal

configMapGenerator:
  - name: portal-nginx-index
    files:
      - index.html=html/index.html

generatorOptions:
  disableNameSuffixHash: true   # 이름 뒤에 해시 안 붙게 (portal-nginx-index 그대로 사용)

patchesStrategicMerge:
  - portal-nginx-index-patch.yaml